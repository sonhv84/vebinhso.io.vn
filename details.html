<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết tin tức</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background: #fff; }
        .back-btn { text-decoration: none; color: #666; font-size: 14px; }
        h1 { color: #333; margin-top: 20px; }
        .meta { color: #888; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        img { width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .content { font-size: 18px; color: #444; }
        .error { text-align: center; margin-top: 50px; color: red; }
    </style>
</head>
<body>
    <a href="test.html" class="back-btn">← Quay lại danh sách</a>
    
    <div id="main-content">
        <h1 id="title"></h1>
        <div class="meta">
            Thời gian: <span id="time"></span> | Danh mục: <b id="label"></b>
        </div>
        <img id="image" src="">
        <div id="content" class="content"></div>
    </div>

    <script>
        // Dữ liệu (Trong thực tế bạn sẽ fetch từ file .json)
        const data = {
            "NEWS_DATA": [
                { 
                    "id": 1, 
                    "label": "Cảnh báo", 
                    "title": "Giả danh nhân viên ngân hàng yêu cầu đọc mã OTP", 
                    "img": "https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=800", 
                    "time": "1 giờ trước",
                    "content": "Đây là nội dung chi tiết của bài viết số 1. Kẻ gian thường giả mạo số tổng đài ngân hàng để gọi điện, đánh vào tâm lý lo sợ hoặc ham rẻ của người dùng. Tuyệt đối không cung cấp mã OTP cho bất kỳ ai."
                },
                { 
                    "id": 2, 
                    "label": "Thủ đoạn", 
                    "title": "Lừa đảo tuyển CTV 'Việc nhẹ lương cao' trên Telegram", 
                    "img": "https://images.unsplash.com/photo-1556742044-3c52d6e88c02?w=800", 
                    "time": "3 giờ trước",
                    "content": "Bài viết số 2: Hình thức tuyển cộng tác viên xử lý đơn hàng ảo đang bùng nổ. Nạn nhân được yêu cầu nạp tiền để nhận hoa hồng cao hơn, sau đó hệ thống báo lỗi và yêu cầu nạp thêm tiền để 'giải đóng băng'."
                },
                { 
                    "id": 6, 
                    "label": "Cảnh báo", 
                    "title": "Mạo danh Cổng dịch vụ công Quốc gia để cài app mã độc", 
                    "img": "https://images.unsplash.com/photo-1563986768609-322da13575f3?w=800", 
                    "time": "2 giờ trước",
                    "content": "Bài viết số 6: Các đối tượng lừa đảo hướng dẫn người dân cài đặt file .apk giả mạo. Sau khi cài đặt, mã độc sẽ chiếm quyền trợ năng (Accessibility Service) để tự động đọc tin nhắn OTP và chuyển tiền từ app ngân hàng."
                }
            ]
        };

        // BẮT ĐẦU LOGIC CHÍNH
        const urlParams = new URLSearchParams(window.location.search);
        const id = parseInt(urlParams.get('id'));

        const article = data.NEWS_DATA.find(item => item.id === id);

        if (article) {
            document.getElementById('title').innerText = article.title;
            document.getElementById('time').innerText = article.time;
            document.getElementById('label').innerText = article.label;
            document.getElementById('image').src = article.img;
            document.getElementById('content').innerText = article.content;
            document.title = article.title;
        } else {
            document.getElementById('main-content').innerHTML = "<h2 class='error'>404 - Không tìm thấy bài viết!</h2>";
        }
    </script>
</body>
</html>
