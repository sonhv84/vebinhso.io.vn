<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài viết | Vệ Binh Số</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="header"></div>

    <main class="container-detail" style="max-width: 1200px; margin: 50px auto; padding: 0 20px;">
        <div id="detailRender">
            </div>
    </main>

    <div id="footer"></div>

    <script src="/js/layout.js"></script>
    <script>
        async function loadContent() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            if (!id) return;

            try {
                const res = await fetch('/data/data.json');
                const data = await res.json();
                const article = data.NEWS_DATA.find(n => n.id === id);

                if (article) {
                    let html = `
                        <div class="article-header" style="margin-bottom: 40px; text-align: center;">
                            <span class="tag ${article.tagClass}">${article.label}</span>
                            <h1 style="font-size: 42px; font-weight: 800; margin: 20px 0;">${article.title}</h1>
                            <p style="font-size: 20px; color: #4b5563; font-weight: 600; line-height: 1.6; max-width: 900px; margin: 0 auto;">${article.sapo}</p>
                            <div style="margin-top: 20px; color: #999;">🕒 ${article.time} | Tác giả: Vệ Binh Số</div>
                        </div>
                        <img src="${article.img}" style="width: 100%; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px;">
                        <div class="article-body" style="font-size: 18px; line-height: 1.9; color: #333; max-width: 800px; margin: 0 auto;">
                    `;

                    article.content.forEach(block => {
                        if (block.type === 'paragraph') html += `<p style="margin-bottom: 25px;">${block.text}</p>`;
                        if (block.type === 'heading') html += `<h2 style="font-size: 28px; font-weight: 700; margin-top: 50px; margin-bottom: 20px;">${block.text}</h2>`;
                        if (block.type === 'quote') html += `<div class="quote-block" style="border-left: 5px solid #2563eb; padding: 30px; background: #f0f7ff; font-style: italic; margin: 40px 0; border-radius: 0 12px 12px 0;">${block.text}</div>`;
                        if (block.type === 'alert') html += `<div class="alert-block alert-${block.level}" style="padding: 25px; border-radius: 12px; margin: 30px 0; font-weight: 600;">⚠️ ${block.text}</div>`;
                    });

                    html += `</div>`;
                    document.getElementById('detailRender').innerHTML = html;
                }
            } catch (err) { console.error("Lỗi tải tin:", err); }
        }
        window.onload = loadContent;
    </script>
</body>
</html>
