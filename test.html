<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vệ Binh Số - Cổng Thông Tin Cảnh Báo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger: #e74c3c;
            --warning: #f1c40f;
            --info: #3498db;
            --text-main: #2c3e50;
            --text-sub: #5f6368;
            --bg-body: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--bg-body);
            margin: 0; padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-radius: 8px; }

        /* Style Báo chí */
        .category-tag { font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; color: var(--danger); margin-bottom: 10px; display: block; }
        
        h1 { font-family: 'Playfair Display', serif; font-size: 36px; line-height: 1.2; margin: 10px 0 20px; color: #1a1a1a; }

        .post-meta { font-size: 14px; color: var(--text-sub); border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; }

        .main-img { width: 100%; height: 400px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .img-caption { font-size: 13px; color: var(--text-sub); text-align: center; font-style: italic; margin-bottom: 30px; display: block; }

        /* Content Styling */
        .article-content h3 { font-size: 22px; margin-top: 30px; color: #1a1a1a; border-left: 4px solid var(--danger); padding-left: 15px; }
        .article-content p { font-size: 18px; margin-bottom: 20px; color: #333; text-align: justify; }

        .warning-box { background: #fff5f5; border: 1px dashed var(--danger); padding: 20px; border-radius: 8px; margin: 30px 0; position: relative; }
        .warning-box::before { content: '⚠ CẢNH BÁO'; position: absolute; top: -12px; left: 20px; background: var(--danger); color: #fff; padding: 2px 10px; font-size: 12px; font-weight: bold; border-radius: 4px; }

        .blacklist-section { background: #f1f3f4; padding: 20px; border-radius: 8px; margin-top: 40px; }
        .blacklist-section h4 { margin-top: 0; color: #d93025; }
        .blacklist-item { font-family: monospace; background: #fff; padding: 2px 6px; border-radius: 3px; margin-right: 5px; font-size: 14px; border: 1px solid #ddd; }

        .footer-action { margin-top: 50px; text-align: center; border-top: 2px solid #1a1a1a; padding-top: 20px; }
        .btn-back { cursor: pointer; color: var(--info); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="container" id="article-root">
    </div>

<script>
    // Giả lập dữ liệu JSON bạn đã cung cấp (đã thêm phần content)
    const newsData = [
        {
            id: 1,
            label: "Cảnh báo",
            title: "Giả danh nhân viên ngân hàng yêu cầu đọc mã OTP",
            author: "Ban Biên Tập Vệ Binh Số",
            time: "1 giờ trước",
            img: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=800",
            blacklist_phones: ["0123456789", "0359107806"],
            content: `
                <p>Trong thời gian gần đây, chúng tôi liên tục nhận được báo cáo về việc các đối tượng lừa đảo sử dụng công nghệ giả mạo số điện thoại để tiếp cận người dân.</p>
                <h3>Thủ đoạn tinh vi</h3>
                <p>Đối tượng tự xưng là nhân viên hỗ trợ thẻ tín dụng, thông báo nạn nhân có một giao dịch lạ hoặc đang được xét duyệt nâng hạn mức thẻ miễn phí. Để "xác minh chính chủ", chúng yêu cầu nạn nhân đọc mã OTP vừa được gửi về điện thoại.</p>
                <div class="warning-box">
                    <strong>Lưu ý tuyệt đối:</strong> Mã OTP (One Time Password) là chìa khóa cuối cùng để thực hiện giao dịch. Nhân viên ngân hàng thật <strong>KHÔNG BAO GIỜ</strong> yêu cầu khách hàng cung cấp mã này dưới bất kỳ hình thức nào.
                </div>
                <h3>Khuyến nghị xử lý</h3>
                <p>Nếu bạn đã lỡ cung cấp thông tin, hãy ngay lập tức thực hiện khóa thẻ trên ứng dụng di động hoặc gọi hotline ngân hàng để phong tỏa tài khoản. Đồng thời, chia sẻ thông tin này đến người thân để nâng cao cảnh giác.</p>
            `
        }
    ];

    // Hàm render bài viết
    function renderArticle(data) {
        const root = document.getElementById('article-root');
        const post = data[0]; // Lấy bài viết đầu tiên làm demo

        root.innerHTML = `
            <span class="category-tag">${post.label}</span>
            <h1>${post.title}</h1>
            <div class="post-meta">
                <span>Bởi: <strong>${post.author}</strong></span>
                <span>${post.time} | 3 phút đọc</span>
            </div>
            
            <img src="${post.img}" class="main-img" alt="Scam Image">
            <span class="img-caption">Hình ảnh: Các thao tác lừa đảo qua thẻ tín dụng đang ngày càng phổ biến.</span>

            <div class="article-content">
                ${post.content}
            </div>

            <div class="blacklist-section">
                <h4>Dữ liệu nhận diện liên quan:</h4>
                <p>Các số điện thoại đã bị báo cáo: 
                    ${post.blacklist_phones.map(p => `<span class="blacklist-item">${p}</span>`).join('')}
                </p>
            </div>

            <div class="footer-action">
                <p>Bạn thấy thông tin này hữu ích? Hãy chia sẻ để cộng đồng cùng phòng tránh.</p>
                <a href="#" class="btn-back">← Quay lại danh sách tin tức</a>
            </div>
        `;
    }

    // Chạy hàm render
    renderArticle(newsData);
</script>

</body>
</html>
