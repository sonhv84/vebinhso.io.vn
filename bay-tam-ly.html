<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Website đang nâng cấp</title>

<link rel="icon" href="./assets/icons/logo_header.ico">
<link rel="stylesheet" href="./css/main.css">

<style>

/* ===============================
   MAINTENANCE PAGE (SCOPED)
================================ */

.maintenance-page{
    font-family: system-ui, -apple-system, Arial;
    background: linear-gradient(135deg,#e0f2fe,#f0f9ff);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* container */

.maintenance-page__container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* card */

.maintenance-page__card{
    background:white;
    padding:50px;
    border-radius:16px;
    max-width:520px;
    width:100%;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* icon */

.maintenance-page__icon{
    font-size:64px;
    margin-bottom:20px;
}

/* title */

.maintenance-page__title{
    margin:0;
    font-size:28px;
    color:#1e293b;
}

/* description */

.maintenance-page__desc{
    color:#64748b;
    margin-top:10px;
}

/* progress */

.maintenance-page__progress{
    width:100%;
    height:8px;
    background:#e2e8f0;
    border-radius:20px;
    overflow:hidden;
    margin-top:30px;
}

.maintenance-page__progress-bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#38bdf8,#22c55e);
    transition:width .3s;
}

/* percent */

.maintenance-page__percent{
    margin-top:10px;
    font-size:14px;
    color:#64748b;
}

/* button */

.maintenance-page__btn{
    margin-top:25px;
    padding:12px 24px;
    border:none;
    border-radius:8px;
    background:#0ea5e9;
    color:white;
    cursor:pointer;
    font-size:15px;
}

.maintenance-page__btn:hover{
    background:#0284c7;
}

/* finish */

.maintenance-page__finish{
    margin-top:20px;
    color:#16a34a;
    display:none;
    font-weight:500;
}

</style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- MAINTENANCE PAGE -->
<div class="maintenance-page">

<div class="maintenance-page__container">

<div class="maintenance-page__card">

<div class="maintenance-page__icon">🛠️</div>

<h1 class="maintenance-page__title">
Website đang nâng cấp
</h1>

<p class="maintenance-page__desc">
Chúng tôi đang cải thiện hệ thống để mang lại trải nghiệm tốt hơn.
</p>

<div class="maintenance-page__progress">
<div class="maintenance-page__progress-bar" id="bar"></div>
</div>

<div class="maintenance-page__percent" id="percent">
0%
</div>

<button class="maintenance-page__btn" onclick="history.back()">
Quay lại trang trước
</button>

<div class="maintenance-page__finish" id="finish">
✔ Nâng cấp hoàn tất
</div>

</div>

</div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<script>

/* ===============================
   LOADING ANIMATION
================================ */

let percent = 0;

const bar = document.getElementById("bar");
const percentText = document.getElementById("percent");
const finish = document.getElementById("finish");

const interval = setInterval(()=>{

    percent += Math.random()*7;

    if(percent >= 100){
        percent = 100;
        clearInterval(interval);
        finish.style.display = "block";
    }

    bar.style.width = percent + "%";
    percentText.innerText = Math.floor(percent) + "%";

},300);

</script>

<script src="./js/layout.js"></script>

</body>
</html>
